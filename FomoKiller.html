<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080A12"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fomo-killer"/>
<title>Fomo-killer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root {
  --bg:       #080A12;
  --bg1:      #0D1020;
  --bg2:      #111426;
  --bg3:      #181C30;
  --glass:    rgba(255,255,255,0.03);
  --glass2:   rgba(255,255,255,0.06);
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --gold:     #E2B96A;
  --gold2:    #F5D48A;
  --gold-glow:rgba(226,185,106,0.25);
  --green:    #52D9A8;
  --green-g:  rgba(82,217,168,0.2);
  --red:      #F0725C;
  --red-g:    rgba(240,114,92,0.2);
  --purple:   #B48EF0;
  --blue:     #6AABF5;
  --text:     #EEE8DA;
  --text2:    #A8A098;
  --muted:    #585468;
  --faint:    #2A2838;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;overscroll-behavior:none;
}

/* ═══════════════════════════════════════════
   NOISE TEXTURE OVERLAY
═══════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.5;
}

/* Radial gradient background glow */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(226,185,106,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(82,217,168,0.05) 0%, transparent 60%);
}

/* ═══════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════ */
#app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100dvh;max-width:480px;margin:0 auto;overflow:hidden;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header{
  flex-shrink:0;
  padding:18px 22px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(8,10,18,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:relative;z-index:20;
}

.logo-wrap{}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem;font-weight:700;
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 50%,#C89040 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.06em;line-height:1;
}
.logo-tag{
  font-size:0.48rem;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--muted);margin-top:3px;
}

.session-pill{
  text-align:right;
  background:var(--glass);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
}
.session-name{font-size:0.58rem;letter-spacing:0.1em;font-weight:700;}
.session-time{font-size:0.48rem;color:var(--muted);letter-spacing:0.1em;margin-top:2px;}

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
.bottom-nav{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:10px 16px 18px;
  background:rgba(8,10,18,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  position:relative;z-index:20;
}
.nav-pill{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:50px;padding:6px 8px;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:8px 22px;border-radius:40px;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);user-select:none;border:none;background:none;
  color:var(--muted);font-family:'Space Mono',monospace;
}
.nav-btn .nb-icon{font-size:1rem;line-height:1;transition:transform 0.2s;}
.nav-btn .nb-label{font-size:0.42rem;letter-spacing:0.2em;text-transform:uppercase;margin-top:1px;}
.nav-btn.active{
  background:linear-gradient(135deg,rgba(226,185,106,0.15),rgba(226,185,106,0.05));
  color:var(--gold);border:1px solid rgba(226,185,106,0.2);
}
.nav-btn.active .nb-icon{transform:translateY(-1px);}

/* ═══════════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════════ */
.scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:20px 18px 16px;
  scroll-behavior:smooth;
}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-track{background:transparent;}
.scroll::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}

/* ═══════════════════════════════════════════
   DIRECTION SELECTOR
═══════════════════════════════════════════ */
.dir-section{margin-bottom:22px;}
.section-label{
  font-size:0.48rem;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}
.dir-row{display:flex;gap:10px;}
.dir-btn{
  flex:1;padding:16px 10px;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--muted);
  font-family:'Space Mono',monospace;
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;border-radius:14px;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;overflow:hidden;
}
.dir-btn::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;
}
.dir-btn.buy::before{background:linear-gradient(135deg,rgba(82,217,168,0.15),transparent);}
.dir-btn.sell::before{background:linear-gradient(135deg,rgba(240,114,92,0.15),transparent);}
.dir-btn.buy.active{border-color:var(--green);color:var(--green);box-shadow:0 0 20px rgba(82,217,168,0.15),inset 0 1px 0 rgba(82,217,168,0.1);}
.dir-btn.buy.active::before{opacity:1;}
.dir-btn.sell.active{border-color:var(--red);color:var(--red);box-shadow:0 0 20px rgba(240,114,92,0.15),inset 0 1px 0 rgba(240,114,92,0.1);}
.dir-btn.sell.active::before{opacity:1;}
.dir-arrow{font-size:1.2rem;display:block;margin-bottom:4px;}

/* ═══════════════════════════════════════════
   CIRCULAR PROGRESS
═══════════════════════════════════════════ */
.progress-section{
  display:flex;align-items:center;gap:18px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:16px 20px;
  margin-bottom:22px;
}
.ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0;}
.ring-svg{transform:rotate(-90deg);width:64px;height:64px;}
.ring-bg{fill:none;stroke:var(--faint);stroke-width:5;}
.ring-fill{
  fill:none;stroke-width:5;stroke-linecap:round;
  stroke:url(#ringGrad);
  stroke-dasharray:163;stroke-dashoffset:163;
  transition:stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1);
}
.ring-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;color:var(--gold);
}
.progress-info{flex:1;}
.progress-title{font-size:0.72rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.progress-sub{font-size:0.55rem;color:var(--muted);letter-spacing:0.08em;}
.progress-bar-mini{
  height:3px;background:var(--faint);border-radius:2px;margin-top:10px;overflow:hidden;
}
.progress-bar-mini-fill{
  height:100%;background:linear-gradient(90deg,var(--gold),var(--green));
  border-radius:2px;transition:width 0.5s ease;
}

/* ═══════════════════════════════════════════
   PHASE CARDS
═══════════════════════════════════════════ */
.phase{
  margin-bottom:12px;
  border-radius:16px;overflow:hidden;
  border:1px solid var(--border);
  background:var(--bg1);
  transition:border-color 0.4s,box-shadow 0.4s;
  position:relative;
}
.phase::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--phase-color);opacity:0.5;transition:opacity 0.3s;
}
.phase.done{box-shadow:0 4px 24px rgba(0,0,0,0.3);}
.phase.done::before{opacity:1;}

.phase-head{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px 11px 20px;
  cursor:pointer;user-select:none;
  background:var(--glass);
  transition:background 0.2s;
}
.phase-head:active{background:var(--glass2);}
.phase-num{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  font-size:0.55rem;font-weight:700;color:var(--phase-color);
  transition:all 0.3s;
}
.phase.done .phase-num{background:var(--phase-color);color:#080A12;border-color:var(--phase-color);}
.phase-label{flex:1;font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text2);}
.phase.done .phase-label{color:var(--text);}
.phase-check{font-size:0.75rem;opacity:0;transform:scale(0.5);transition:all 0.3s;color:var(--phase-color);}
.phase.done .phase-check{opacity:1;transform:scale(1);}
.phase-count{font-size:0.52rem;color:var(--muted);}

/* ═══════════════════════════════════════════
   CHECKLIST ITEMS
═══════════════════════════════════════════ */
.items-wrap{border-top:1px solid var(--border);}

.item{
  display:flex;align-items:flex-start;gap:14px;
  padding:13px 16px 13px 20px;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  border-bottom:1px solid var(--border);
  transition:background 0.15s;
  position:relative;
}
.item:last-child{border-bottom:none;}
.item:active{background:rgba(255,255,255,0.03);}
.item.ischecked{background:rgba(255,255,255,0.015);}

/* Custom checkbox */
.cb{
  width:24px;height:24px;flex-shrink:0;
  border:1.5px solid var(--faint);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  margin-top:0px;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  position:relative;overflow:hidden;
}
.cb::before{
  content:'';position:absolute;inset:0;
  background:var(--phase-color);
  transform:scale(0);border-radius:5px;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.cb.ischecked{border-color:var(--phase-color);box-shadow:0 0 10px rgba(var(--phase-rgb),0.3);}
.cb.ischecked::before{transform:scale(1);}
.cb svg{position:relative;z-index:1;opacity:0;transform:scale(0.6);transition:all 0.2s 0.05s;}
.cb.ischecked svg{opacity:1;transform:scale(1);}

.item-text{
  font-size:0.73rem;line-height:1.6;color:var(--muted);
  transition:color 0.25s;flex:1;
}
.item.ischecked .item-text{color:var(--text);}
.item-strike{position:relative;}
.item.ischecked .item-strike::after{
  content:'';position:absolute;left:0;right:0;top:50%;height:1px;
  background:var(--muted);opacity:0.4;
}

/* ═══════════════════════════════════════════
   VALIDATE ZONE
═══════════════════════════════════════════ */
.validate-zone{margin-top:16px;}

.validate-btn{
  width:100%;padding:18px;border:none;
  background:linear-gradient(135deg,var(--gold2),var(--gold),#B8891A);
  color:#080A12;
  font-family:'Space Mono',monospace;
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.22em;text-transform:uppercase;
  cursor:pointer;border-radius:14px;
  transition:all 0.25s;margin-bottom:10px;
  box-shadow:0 4px 24px rgba(226,185,106,0.3);
  position:relative;overflow:hidden;
}
.validate-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;transition:opacity 0.2s;
}
.validate-btn:active{transform:scale(0.98);}
.validate-btn:active::after{opacity:1;}
.validate-btn:disabled{
  background:var(--bg3);color:var(--muted);cursor:not-allowed;
  box-shadow:none;
}

/* Pulse animation when ready */
@keyframes pulse-glow{
  0%,100%{box-shadow:0 4px 24px rgba(226,185,106,0.3);}
  50%{box-shadow:0 4px 40px rgba(226,185,106,0.6),0 0 60px rgba(226,185,106,0.2);}
}
.validate-btn.ready{animation:pulse-glow 2s ease-in-out infinite;}

.reset-btn{
  width:100%;padding:13px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-family:'Space Mono',monospace;
  font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;
  cursor:pointer;border-radius:14px;transition:all 0.2s;
}
.reset-btn:active{background:var(--glass2);}

/* Blocker */
.blocker{
  background:rgba(240,114,92,0.05);
  border:1px solid rgba(240,114,92,0.2);
  border-radius:12px;padding:13px 16px;
  font-size:0.6rem;color:var(--red);
  letter-spacing:0.06em;text-align:center;
  margin-bottom:10px;line-height:1.7;
}

/* Confirmed banner */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.confirmed-banner{
  background:linear-gradient(135deg,rgba(82,217,168,0.08),rgba(82,217,168,0.03));
  border:1px solid rgba(82,217,168,0.25);
  border-radius:16px;padding:22px 20px;
  text-align:center;margin-bottom:12px;
  animation:fadeSlideUp 0.5s cubic-bezier(0.4,0,0.2,1);
  position:relative;overflow:hidden;
}
.confirmed-banner::before{
  content:'✦';position:absolute;top:-10px;left:-10px;
  font-size:5rem;color:rgba(82,217,168,0.03);pointer-events:none;
}
.conf-icon{font-size:2rem;margin-bottom:8px;}
.conf-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--green);margin-bottom:6px;}
.conf-sub{font-size:0.55rem;color:rgba(82,217,168,0.6);letter-spacing:0.18em;text-transform:uppercase;}

/* ═══════════════════════════════════════════
   JOURNAL
═══════════════════════════════════════════ */
.page-header{margin-bottom:20px;}
.page-header h2{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:4px;
}
.page-header p{font-size:0.5rem;color:var(--muted);letter-spacing:0.22em;text-transform:uppercase;}

.journal-entry{
  background:var(--bg1);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:10px;
  transition:border-color 0.2s;
  position:relative;overflow:hidden;
}
.journal-entry::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.journal-entry.BUY::before{background:var(--green);}
.journal-entry.SELL::before{background:var(--red);}
.journal-entry:active{border-color:var(--border2);}

.je-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.je-dir{
  display:flex;align-items:center;gap:6px;
  font-size:0.62rem;font-weight:700;letter-spacing:0.15em;padding:4px 10px;
  border-radius:20px;
}
.je-dir.BUY{color:var(--green);background:rgba(82,217,168,0.1);border:1px solid rgba(82,217,168,0.2);}
.je-dir.SELL{color:var(--red);background:rgba(240,114,92,0.1);border:1px solid rgba(240,114,92,0.2);}
.je-meta{display:flex;align-items:center;gap:8px;}
.je-date{font-size:0.5rem;color:var(--muted);letter-spacing:0.08em;}
.je-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:0.9rem;padding:4px 6px;border-radius:6px;transition:all 0.2s;}
.je-del:active{color:var(--red);background:rgba(240,114,92,0.1);}

.je-pair{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--text);line-height:1;margin-bottom:6px;}
.je-note{font-size:0.63rem;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-style:italic;}

.empty-state{
  text-align:center;padding:60px 20px;
  animation:fadeSlideUp 0.5s ease;
}
.empty-icon{font-size:3rem;margin-bottom:16px;display:block;opacity:0.4;}
.empty-state p{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;line-height:2.2;}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{
  background:var(--bg1);border:1px solid var(--border);
  border-radius:16px;padding:18px 16px;
  position:relative;overflow:hidden;
  transition:border-color 0.2s;
}
.stat-card::before{
  content:'';position:absolute;bottom:0;right:0;
  width:60px;height:60px;border-radius:50%;
  background:var(--card-accent,rgba(226,185,106,0.06));
  transform:translate(20px,20px);
}
.stat-val{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;font-weight:700;line-height:1;margin-bottom:6px;
}
.stat-lbl{font-size:0.48rem;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;line-height:1.5;}

.discipline-card{
  background:linear-gradient(135deg,rgba(226,185,106,0.08),rgba(226,185,106,0.02));
  border:1px solid rgba(226,185,106,0.2);
  border-radius:16px;padding:20px;margin-bottom:12px;
  display:flex;align-items:center;gap:16px;
}
.disc-icon{font-size:2rem;flex-shrink:0;}
.disc-text h3{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);margin-bottom:4px;}
.disc-text p{font-size:0.55rem;color:var(--text2);line-height:1.7;letter-spacing:0.04em;}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:flex-end;
  background:rgba(8,10,18,0.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity 0.3s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg2);border-radius:24px 24px 0 0;
  padding:24px 20px 36px;width:100%;
  border-top:1px solid var(--border2);
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-width:480px;margin:0 auto;
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 20px;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;margin-bottom:18px;}
.modal label{font-size:0.48rem;color:var(--muted);letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:7px;}
.modal input,.modal textarea{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);color:var(--text);
  font-family:'Space Mono',monospace;font-size:0.75rem;
  padding:12px 14px;border-radius:12px;outline:none;margin-bottom:16px;
  -webkit-appearance:none;transition:border-color 0.2s;
}
.modal input:focus,.modal textarea:focus{border-color:rgba(226,185,106,0.4);}
.modal textarea{resize:none;height:80px;line-height:1.6;}
.modal-btns{display:flex;gap:10px;margin-top:4px;}
.modal-save{
  flex:2;padding:14px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#080A12;border:none;border-radius:12px;
  font-family:'Space Mono',monospace;font-size:0.62rem;
  font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;
}
.modal-cancel{
  flex:1;padding:14px;background:var(--bg3);
  color:var(--text2);border:1px solid var(--border);border-radius:12px;
  font-family:'Space Mono',monospace;font-size:0.62rem;
  letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;
}

/* ═══════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════ */
@keyframes slideIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.phase{animation:slideIn 0.4s ease both;}
.phase:nth-child(1){animation-delay:0.05s;}
.phase:nth-child(2){animation-delay:0.1s;}
.phase:nth-child(3){animation-delay:0.15s;}
.phase:nth-child(4){animation-delay:0.2s;}
.phase:nth-child(5){animation-delay:0.25s;}

@keyframes shimmer{
  0%{background-position:200% center;}
  100%{background-position:-200% center;}
}
.phase.done .phase-label{
  background:linear-gradient(90deg,var(--text),var(--gold2),var(--text));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;
}

/* ═══════════════════════════════════════════
   DIVIDER / RULE
═══════════════════════════════════════════ */
.rule-strip{
  font-size:0.48rem;color:var(--faint);text-align:center;
  letter-spacing:0.2em;text-transform:uppercase;
  padding:20px 0;line-height:2.5;
}
.rule-strip span{display:inline-block;margin:0 8px;opacity:0.5;}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo">Fomo-killer</div>
      <div class="logo-tag">FundingPips · SMC · 0.5% risk</div>
    </div>
    <div class="session-pill" id="session-badge">
      <div class="session-name" id="sess-name">—</div>
      <div class="session-time" id="sess-time">—</div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll" id="main-scroll">

    <!-- ═══ CHECKLIST TAB ═══ -->
    <div id="tab-checklist">

      <!-- Direction -->
      <div class="dir-section">
        <div class="section-label">Direction du trade</div>
        <div class="dir-row">
          <button class="dir-btn buy" onclick="setDir('BUY',this)">
            <span class="dir-arrow">▲</span>BUY · LONG
          </button>
          <button class="dir-btn sell" onclick="setDir('SELL',this)">
            <span class="dir-arrow">▼</span>SELL · SHORT
          </button>
        </div>
      </div>

      <!-- Circular Progress -->
      <div class="progress-section">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 56 56">
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#E2B96A"/>
                <stop offset="100%" stop-color="#52D9A8"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="28" cy="28" r="26"/>
            <circle class="ring-fill" id="ring-fill" cx="28" cy="28" r="26"/>
          </svg>
          <div class="ring-pct" id="ring-pct">0%</div>
        </div>
        <div class="progress-info">
          <div class="progress-title" id="prog-title">Checklist en attente</div>
          <div class="progress-sub" id="prog-sub">0 / 17 conditions validées</div>
          <div class="progress-bar-mini">
            <div class="progress-bar-mini-fill" id="prog-bar" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Phases -->
      <div id="phases-container"></div>

      <!-- Validate zone -->
      <div class="validate-zone" id="validate-zone"></div>

      <div class="rule-strip">
        Max 2 trades/jour<span>·</span>0.5% risque max<span>·</span>Aucune exception
      </div>
    </div>

    <!-- ═══ JOURNAL TAB ═══ -->
    <div id="tab-journal" style="display:none">
      <div class="page-header">
        <h2>Journal</h2>
        <p>Historique des setups validés</p>
      </div>
      <div id="journal-list"></div>
    </div>

    <!-- ═══ STATS TAB ═══ -->
    <div id="tab-stats" style="display:none">
      <div class="page-header">
        <h2>Statistiques</h2>
        <p>Discipline & performance</p>
      </div>
      <div id="disc-card"></div>
      <div class="stat-grid" id="stats-grid"></div>
    </div>

  </div><!-- end scroll -->

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-pill">
      <button class="nav-btn active" onclick="switchTab('checklist',this)">
        <span class="nb-icon">☑</span>
        <span class="nb-label">Check</span>
      </button>
      <button class="nav-btn" onclick="switchTab('journal',this)">
        <span class="nb-icon">📋</span>
        <span class="nb-label">Journal</span>
      </button>
      <button class="nav-btn" onclick="switchTab('stats',this)">
        <span class="nb-icon">📊</span>
        <span class="nb-label">Stats</span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Enregistrer le Setup</h3>
    <label>Paire de devises</label>
    <input type="text" id="modal-pair" placeholder="XAUUSD, EURUSD, GBPJPY..."/>
    <label>Observation post-trade</label>
    <textarea id="modal-note" placeholder="Setup propre, OB + FVG en confluence, entrée sur CHoCH confirmé..."></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-save" onclick="saveTrade()">Enregistrer ✓</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const PHASES = [
  {
    id:'bias',num:'01',label:'Biais HTF — H4',color:'#E2B96A',rgb:'226,185,106',
    items:[
      {id:'b1',text:'Tendance H4 clairement identifiée (bullish / bearish)'},
      {id:'b2',text:'Le prix est dans une zone d\'intérêt H4 (liquidité, S/R majeur)'},
      {id:'b3',text:'Biais HTF aligné avec la direction du trade envisagé'},
    ]
  },
  {
    id:'zone',num:'02',label:'Zones clés — H1',color:'#52D9A8',rgb:'82,217,168',
    items:[
      {id:'z1',text:'Zone de liquidité H1 identifiée et tracée sur le graphique'},
      {id:'z2',text:'Le prix a atteint la zone — pas d\'anticipation prématurée'},
      {id:'z3',text:'Order Block (OB) validé sur H1 — origine du mouvement impulsif'},
    ]
  },
  {
    id:'entry',num:'03',label:'Confirmation LTF',color:'#B48EF0',rgb:'180,142,240',
    items:[
      {id:'e1',text:'CHoCH (Change of Character) confirmé sur lower timeframe'},
      {id:'e2',text:'Retest de l\'OB LTF en cours ou validé proprement'},
      {id:'e3',text:'FVG (Fair Value Gap) présent en confluence avec l\'OB'},
      {id:'e4',text:'⚠ Bougie de confirmation FERMÉE — jamais sur bougie ouverte'},
    ]
  },
  {
    id:'session',num:'04',label:'Session & Contexte',color:'#F0725C',rgb:'240,114,92',
    items:[
      {id:'s1',text:'Session active : Londres ou New York uniquement'},
      {id:'s2',text:'Aucun événement macro dans les 30 prochaines minutes'},
      {id:'s3',text:'Quota journalier disponible — max 2 trades par jour'},
    ]
  },
  {
    id:'risk',num:'05',label:'Gestion du Risque',color:'#6AABF5',rgb:'106,171,245',
    items:[
      {id:'r1',text:'Stop Loss placé correctement sous / sur la structure LTF'},
      {id:'r2',text:'Risque calculé : ≤ 0.5% du compte sur ce trade'},
      {id:'r3',text:'Risk/Reward ≥ 1:2 vérifié avant toute entrée'},
      {id:'r4',text:'État émotionnel calme — aucune revenge, aucun FOMO'},
    ]
  }
];

const TOTAL = PHASES.reduce((a,p)=>a+p.items.length,0);

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let checked={}, direction=null, confirmed=false;
let journal=JSON.parse(localStorage.getItem('fk_journal')||'[]');
let pendingDir=null;

/* ══════════════════════════════════════════
   RENDER PHASES
══════════════════════════════════════════ */
function renderPhases(){
  const c=document.getElementById('phases-container');
  c.innerHTML='';
  PHASES.forEach((phase,idx)=>{
    const doneCount=phase.items.filter(i=>checked[i.id]).length;
    const done=doneCount===phase.items.length;
    const div=document.createElement('div');
    div.className='phase'+(done?' done':'');
    div.style.setProperty('--phase-color',phase.color);
    div.style.setProperty('--phase-rgb',phase.rgb);
    div.style.animationDelay=(idx*0.06)+'s';
    div.innerHTML=`
      <div class="phase-head">
        <div class="phase-num">${done?'✓':phase.num}</div>
        <div class="phase-label">${phase.label}</div>
        ${done?`<div class="phase-check">✦</div>`:`<div class="phase-count">${doneCount}/${phase.items.length}</div>`}
      </div>
      <div class="items-wrap">
        ${phase.items.map(item=>{
          const ck=checked[item.id];
          return `<div class="item${ck?' ischecked':''}" onclick="toggle('${item.id}')">
            <div class="cb${ck?' ischecked':''}" style="--phase-color:${phase.color}">
              <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                <path d="M1 4.5L4 7.5L10 1" stroke="#080A12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-text">${item.text}</div>
          </div>`;
        }).join('')}
      </div>`;
    c.appendChild(div);
  });
  updateProgress();
  renderValidate();
}

/* ══════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════ */
function updateProgress(){
  const n=Object.values(checked).filter(Boolean).length;
  const pct=Math.round(n/TOTAL*100);
  // Ring
  const circ=2*Math.PI*26;
  const offset=circ-(circ*pct/100);
  document.getElementById('ring-fill').style.strokeDashoffset=offset;
  document.getElementById('ring-fill').style.strokeDasharray=circ;
  document.getElementById('ring-pct').textContent=pct+'%';
  // Bar
  document.getElementById('prog-bar').style.width=pct+'%';
  // Text
  const titles=['Checklist en attente','En cours…','Presque prêt…','Conditions réunies ✓'];
  const ti=pct===0?0:pct<50?1:pct<100?2:3;
  document.getElementById('prog-title').textContent=titles[ti];
  document.getElementById('prog-sub').textContent=n+' / '+TOTAL+' conditions validées';
}

/* ══════════════════════════════════════════
   VALIDATE ZONE
══════════════════════════════════════════ */
function renderValidate(){
  const n=Object.values(checked).filter(Boolean).length;
  const allDone=n===TOTAL;
  const z=document.getElementById('validate-zone');
  if(confirmed){
    const t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    z.innerHTML=`
      <div class="confirmed-banner">
        <div class="conf-icon">🎯</div>
        <div class="conf-title">Setup validé — Execute</div>
        <div class="conf-sub">${direction} · 0.5% risque · ${t}</div>
      </div>
      <button class="reset-btn" onclick="resetChecklist()">↺ Nouveau trade</button>`;
  } else {
    let html='';
    if(allDone&&!direction) html+=`<div class="blocker">Sélectionne la direction du trade avant de valider</div>`;
    const ready=allDone&&direction;
    html+=`<button class="validate-btn${ready?' ready':''}" ${ready?'':'disabled'} onclick="validate()">
      ${ready?'🔓 Valider & Exécuter':'🔒 Complète toutes les étapes'}
    </button>`;
    html+=`<button class="reset-btn" onclick="resetChecklist()">↺ Réinitialiser</button>`;
    z.innerHTML=html;
  }
}

/* ══════════════════════════════════════════
   INTERACTIONS
══════════════════════════════════════════ */
function toggle(id){
  if(confirmed) return;
  checked[id]=!checked[id];
  if(navigator.vibrate) navigator.vibrate(checked[id]?[20]:[10,5,10]);
  renderPhases();
}

function setDir(d,btn){
  if(confirmed) return;
  direction=d;
  document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(navigator.vibrate) navigator.vibrate(15);
  renderValidate();
}

function validate(){
  confirmed=true;
  if(navigator.vibrate) navigator.vibrate([40,20,60,20,100]);
  renderValidate();
  setTimeout(()=>{pendingDir=direction;openModal();},700);
}

function resetChecklist(){
  checked={};direction=null;confirmed=false;
  document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('main-scroll').scrollTop=0;
  renderPhases();
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function switchTab(tab,el){
  ['checklist','journal','stats'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(tab==='journal') renderJournal();
  if(tab==='stats') renderStats();
}

/* ══════════════════════════════════════════
   JOURNAL
══════════════════════════════════════════ */
function openModal(){
  document.getElementById('modal-pair').value='';
  document.getElementById('modal-note').value='';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

function saveTrade(){
  const pair=document.getElementById('modal-pair').value.trim().toUpperCase()||'—';
  const note=document.getElementById('modal-note').value.trim();
  journal.unshift({
    id:Date.now(),
    dir:pendingDir||direction,pair,note,
    date:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}),
    time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
  });
  localStorage.setItem('fk_journal',JSON.stringify(journal));
  closeModal();pendingDir=null;
}

function deleteEntry(id){
  if(!confirm('Supprimer ce trade ?')) return;
  journal=journal.filter(e=>e.id!==id);
  localStorage.setItem('fk_journal',JSON.stringify(journal));
  renderJournal();
}

function renderJournal(){
  const el=document.getElementById('journal-list');
  if(!journal.length){
    el.innerHTML=`<div class="empty-state">
      <span class="empty-icon">📭</span>
      <p>Aucun trade enregistré<br>Complète une checklist pour<br>ajouter ton premier setup</p>
    </div>`;return;
  }
  el.innerHTML=journal.map(e=>`
    <div class="journal-entry ${e.dir}">
      <div class="je-head">
        <span class="je-dir ${e.dir}">${e.dir==='BUY'?'▲':'▼'} ${e.dir}</span>
        <div class="je-meta">
          <span class="je-date">${e.date} · ${e.time}</span>
          <button class="je-del" onclick="deleteEntry(${e.id})">✕</button>
        </div>
      </div>
      <div class="je-pair">${e.pair}</div>
      ${e.note?`<div class="je-note">${e.note}</div>`:''}
    </div>`).join('');
}

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
function renderStats(){
  const total=journal.length;
  const buys=journal.filter(e=>e.dir==='BUY').length;
  const sells=journal.filter(e=>e.dir==='SELL').length;
  const today=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
  const todayTrades=journal.filter(e=>e.date===today).length;
  const remaining=Math.max(0,2-todayTrades);

  document.getElementById('disc-card').innerHTML=`
    <div class="discipline-card">
      <div class="disc-icon">🏆</div>
      <div class="disc-text">
        <h3>Discipline Score</h3>
        <p>${total>0?total+' setup'+(total>1?'s':'')+' exécutés avec checklist complète.<br>Continue comme ça.':'Aucun trade enregistré pour le moment.<br>Lance ta première checklist.'}</p>
      </div>
    </div>`;

  const cards=[
    {val:total,lbl:'Trades totaux',color:'var(--text)',accent:'rgba(226,185,106,0.06)'},
    {val:remaining+' / 2',lbl:'Restants aujourd\'hui',color:remaining===0?'var(--red)':'var(--green)',accent:remaining===0?'rgba(240,114,92,0.06)':'rgba(82,217,168,0.06)'},
    {val:buys,lbl:'Setups Long',color:'var(--green)',accent:'rgba(82,217,168,0.06)'},
    {val:sells,lbl:'Setups Short',color:'var(--red)',accent:'rgba(240,114,92,0.06)'},
  ];
  document.getElementById('stats-grid').innerHTML=cards.map(d=>`
    <div class="stat-card" style="--card-accent:${d.accent}">
      <div class="stat-val" style="color:${d.color}">${d.val}</div>
      <div class="stat-lbl">${d.lbl}</div>
    </div>`).join('');
}

/* ══════════════════════════════════════════
   SESSION
══════════════════════════════════════════ */
function updateSession(){
  const now=new Date();
  const h=now.getUTCHours();
  const ldn=h>=8&&h<17,ny=h>=13&&h<22;
  let name,col;
  if(ldn&&ny){name='Londres + NY';col='var(--gold)';}
  else if(ldn){name='Session Londres';col='var(--green)';}
  else if(ny){name='Session New York';col='var(--blue)';}
  else{name='Hors session';col='var(--muted)';}
  document.getElementById('sess-name').style.color=col;
  document.getElementById('sess-name').textContent=name;
  document.getElementById('sess-time').textContent=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+' UTC';
}

/* ══════════════════════════════════════════
   MODAL BACKDROP
══════════════════════════════════════════ */
document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

/* ══════════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════════ */
if('serviceWorker' in navigator){
  const sw=`const C='fk-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C)));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
renderPhases();
updateSession();
setInterval(updateSession,30000);
</script>
</body>
</html>
